version: '3.8'

services:
  # =====================================================================
  # SERVICE 1: REDIS CACHE ENGINE (SECURED INTERNAL NETWORKING)
  # =====================================================================
  cache_store:
    image: redis:7.2-alpine
    container_name: early-warning-cache
    restart: unless-stopped
    command: redis-server --appendonly yes
    # ports: - "6379:6379"  <--- FIX #3: Removed! Exposing this is a critical security vulnerability.
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - platform_mesh

  # =====================================================================
  # SERVICE 2: EXPLICIT HORIZONTAL API WORKERS (FIX #1)
  # =====================================================================
  api_worker_1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: early-warning-api-1
    restart: always
    environment:
      - REDIS_HOST=cache_store
      - REDIS_PORT=6379
    depends_on:
      cache_store:
        condition: service_healthy
    networks:
      - platform_mesh

  api_worker_2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: early-warning-api-2
    restart: always
    environment:
      - REDIS_HOST=cache_store
      - REDIS_PORT=6379
    depends_on:
      cache_store:
        condition: service_healthy
    networks:
      - platform_mesh

  api_worker_3:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: early-warning-api-3
    restart: always
    environment:
      - REDIS_HOST=cache_store
      - REDIS_PORT=6379
    depends_on:
      cache_store:
        condition: service_healthy
    networks:
      - platform_mesh

  # =====================================================================
  # SERVICE 3: NGINX GATEWAY & LOAD BALANCER (FIX #2 & #4)
  # =====================================================================
  gateway:
    image: nginx:alpine
    container_name: early-warning-gateway
    restart: always
    ports:
      - "8000:8000" # Exposes traffic to your host machine safely at the entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_worker_1
      - api_worker_2
      - api_worker_3
    networks:
      - platform_mesh

volumes:
  redis_data:

networks:
  platform_mesh:
    driver: bridge